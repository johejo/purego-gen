name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        runs_on:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Run CI checks
        run: nix develop -c just ci
